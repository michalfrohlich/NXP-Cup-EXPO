[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 921600
lib_deps =
    adafruit/Adafruit SSD1306
build_src_filter =
    +<*>

[env:teensy41-sdtest]
extends = env:teensy41
monitor_speed = 115200
build_flags =
    -DTEENSY_APP_SELECTED_MODE=TEENSY_APP_MODE_SD_LOG_TEST
