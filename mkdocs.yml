site_name: NXP Cup Car Firmware
site_description: Engineering documentation for the multi-board NXP Cup car firmware.
repo_url: https://github.com/michalfrohlich/NXP-Cup-EXPO

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - System:
      - Overview: system/README.md
  - Protocols:
      - Overview: protocols/README.md
      - Teensy SPI Test: protocols/teensy-s32k-128b-spi-test.md
  - Tooling:
      - MkDocs: tooling/mkdocs.md
      - Pre-Commit And Formatting: tooling/pre-commit-and-formatting.md
